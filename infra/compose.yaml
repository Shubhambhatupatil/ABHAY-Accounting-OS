services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - env.example
    ports:
      - "8000:8000"
  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - env.example
    ports:
      - "3000:3000"
    depends_on:
      - api
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: abhay
      POSTGRES_USER: abhay
      POSTGRES_PASSWORD: abhay123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
