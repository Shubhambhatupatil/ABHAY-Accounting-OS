spring:
  datasource:
    url: jdbc:h2:mem:abhay;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

abhay:
  security:
    jwt-secret: test-secret-key-that-is-long-enough-for-hmac-signing
    jwt-expiration-minutes: 60
    cors-origins: http://localhost:5173
    rate-limit-enabled: false
  scheduler:
    enabled: false
